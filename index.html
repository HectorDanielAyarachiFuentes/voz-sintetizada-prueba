<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz Mejorada Sintetizada - Offline TTS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            --primary: #6366f1; --bg: #0a0a14; --surface: #12121f;
            --surface2: #1a1a2e; --border: #2a2a4a; --text: #e2e8f0;
            --muted: #64748b; --success: #22c55e; --warning: #f59e0b; --error: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 2rem; width: 100%; max-width: 560px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; background: rgba(99, 102, 241, 0.15); color: #818cf8; font-size: 0.7rem; padding: 2px 10px; border-radius: 999px; margin-bottom: 0.5rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
        select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 0.7rem; outline: none; }
        textarea { min-height: 100px; resize: vertical; }
        .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        button { width: 100%; padding: 0.9rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        #btnSpeak { background: var(--primary); color: white; }
        #btnSpeak:disabled { opacity: 0.5; cursor: not-allowed; }
        #btnDownload { background: var(--surface2); color: var(--text); margin-top: 0.5rem; display: none; border: 1px solid var(--border); }
        .status-bar { margin-top: 1rem; padding: 0.8rem; border-radius: 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
        .status-bar.loading { color: var(--warning); background: rgba(245,158,11,0.1); }
        .status-bar.ready { color: var(--success); background: rgba(34,197,94,0.1); }
        .status-bar.error { color: var(--error); background: rgba(239,68,68,0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        audio { width: 100%; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="badge">🔒 100% Offline</div>
            <h1>Voz Mejorada Sintetizada</h1>
            <p style="color: var(--muted); font-size: 0.8rem;">Motor Piper TTS + ONNX Runtime</p>
        </div>

        <div class="field">
            <label>Voz</label>
            <select id="voiceSelect" class="voice-select">
                <option value="daniela">Daniela (Argentina)</option>
                <option value="claude">Claude (México)</option>
                <option value="test_en">Voz de Prueba (Inglés)</option>
            </select>
        </div>

        <div class="field">
            <label>Texto</label>
            <textarea id="textInput">Hola Héctor, ¿cómo estás? Esta es una prueba de voz profesional funcionando totalmente fuera de línea.</textarea>
        </div>

        <div class="sliders">
            <div class="field"><label>Velocidad</label><input type="range" id="lengthScale" min="0.5" max="2" step="0.1" value="1"></div>
            <div class="field"><label>Variación</label><input type="range" id="noiseScale" min="0.1" max="1.5" step="0.1" value="0.67"></div>
        </div>

        <button id="btnSpeak" disabled>⏳ Cargando motor...</button>
        <audio id="player" controls></audio>
        <button id="btnDownload">⬇ Descargar WAV</button>

        <div id="statusBar" class="status-bar loading"><div class="dot"></div><span id="statusMsg">Inicializando motor...</span></div>
    </div>

    <!-- Motor Sherpa-ONNX (Versión Local) -->
    <script src="./sherpa-onnx-wasm-main-tts.js"></script>
    <script src="./sherpa-onnx-tts.js"></script>
    <script>
        const VOICES = {
            daniela: {
                model: "./daniela/es_AR-daniela-high.onnx",
                tokens: "./daniela/es_AR-daniela-high.onnx.json"
            },
            claude: {
                model: "./claude/es_MX-claude-high.onnx",
                tokens: "./claude/es_MX-claude-high.onnx.json"
            },
            test_en: {
                model: "en_US-libritts_r-medium.onnx",
                tokens: "tokens.txt",
                isInternal: true
            }
        };

        let tts = null;

        const btn = document.getElementById('btnSpeak');
        const btnDl = document.getElementById('btnDownload');
        const player = document.getElementById('player');
        const statusMsg = document.getElementById('statusMsg');
        const statusBar = document.getElementById('statusBar');
        const voiceSelect = document.getElementById('voiceSelect');
        const textInput = document.getElementById('textInput');

        function setStatus(msg, cls) {
            statusBar.className = 'status-bar ' + cls;
            statusMsg.textContent = msg;
        }

        // Configurar el Módulo global antes de que se use
        Module.onRuntimeInitialized = () => {
            console.log("Motor WASM inicializado correctamente.");
            initTTS();
        };

        async function initTTS() {
            try {
                btn.disabled = true;
                setStatus('Preparando archivos de voz...', 'loading');

                const voiceKey = voiceSelect.value;
                const selected = VOICES[voiceKey];
                let modelName = selected.model;
                let tokensName = selected.tokens;

                if (!selected.isInternal) {
                    // Función para montar archivos en el sistema de archivos virtual de WASM
                    async function mountFile(path, name) {
                        const response = await fetch(path);
                        const buffer = await response.arrayBuffer();
                        const data = new Uint8Array(buffer);
                        Module.FS_createDataFile("/", name, data, true, true, true);
                        return name;
                    }

                    // Montamos los archivos locales en la raíz del motor
                    modelName = await mountFile(selected.model, 'model.onnx');
                    tokensName = await mountFile(selected.tokens, 'tokens.txt');
                }

                setStatus('Configurando motor...', 'loading');
                
                const config = {
                    offlineTtsModelConfig: {
                        offlineTtsVitsModelConfig: {
                            model: modelName,
                            tokens: tokensName,
                            noiseScale: 0.667,
                            noiseScaleW: 0.8,
                            lengthScale: 1.0,
                        },
                        numThreads: 1,
                        debug: 1,
                        provider: 'cpu',
                    },
                    ruleFsts: '',
                    maxNumSentences: 1,
                };

                // ¡ORDE CORRECTO! (Module, config)
                tts = createOfflineTts(Module, config);

                btn.disabled = false;
                btn.textContent = '🎙 Sintetizar y Escuchar';
                setStatus('Motor listo ✓', 'ready');
            } catch (err) {
                setStatus('Error de motor', 'error');
                console.error("Fallo crítico en Sherpa-ONNX:", err);
            }
        }

        voiceSelect.onchange = () => {
            // Recargar para limpiar el FS virtual y evitar conflictos
            location.reload();
        };

        btn.onclick = async () => {
            const text = textInput.value.trim();
            if (!text || !tts) return;

            btn.disabled = true;
            setStatus('Sintetizando...', 'loading');

            try {
                const audio = tts.generate({ text: text, sid: 0 });
                
                const sampleRate = audio.sampleRate;
                const audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
                const buffer = audioContext.createBuffer(1, audio.samples.length, sampleRate);
                buffer.getChannelData(0).set(audio.samples);

                const source = audioContext.createBufferSource();
                source.buffer = buffer;
                source.connect(audioContext.destination);
                source.start();
                
                const wavBlob = exportWav(audio.samples, sampleRate);
                const url = URL.createObjectURL(wavBlob);
                player.src = url;
                player.style.display = 'block';
                player.play();

                btnDl.style.display = 'block';
                btnDl.onclick = () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'voz_generada.wav';
                    a.click();
                };

                setStatus('✓ Audio generado', 'ready');
            } catch (e) {
                console.error(e);
                setStatus('Error en síntesis', 'error');
            } finally {
                btn.disabled = false;
            }
        };

        function exportWav(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            const writeString = (off, s) => { for (let i=0; i<s.length; i++) view.setUint8(off+i, s.charCodeAt(i)); };
            
            writeString(0, 'RIFF'); view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            writeString(36, 'data'); view.setUint32(40, samples.length * 2, true);

            for (let i = 0, offset = 44; i < samples.length; i++, offset += 2) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        // Manejo robusto de la inicialización
        if (Module.calledRun) {
            initTTS();
        } else {
            Module.onRuntimeInitialized = () => {
                initTTS();
            };
        }
    </script>
</body>
</html>
