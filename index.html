<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voz Mejorada Sintetizada - Offline TTS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root {
            --primary: #6366f1; --bg: #0a0a14; --surface: #12121f;
            --surface2: #1a1a2e; --border: #2a2a4a; --text: #e2e8f0;
            --muted: #64748b; --success: #22c55e; --warning: #f59e0b; --error: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
            background-image: radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
        }
        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
            padding: 2rem; width: 100%; max-width: 560px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h1 { font-size: 1.5rem; background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .badge { display: inline-block; background: rgba(99, 102, 241, 0.15); color: #818cf8; font-size: 0.7rem; padding: 2px 10px; border-radius: 999px; margin-bottom: 0.5rem; }
        .field { margin-bottom: 1rem; }
        label { display: block; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 0.4rem; }
        select, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 0.7rem; outline: none; }
        textarea { min-height: 100px; resize: vertical; }
        .sliders { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        button { width: 100%; padding: 0.9rem; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        #btnSpeak { background: var(--primary); color: white; }
        #btnSpeak:disabled { opacity: 0.5; cursor: not-allowed; }
        #btnDownload { background: var(--surface2); color: var(--text); margin-top: 0.5rem; display: none; border: 1px solid var(--border); }
        .status-bar { margin-top: 1rem; padding: 0.8rem; border-radius: 10px; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
        .status-bar.loading { color: var(--warning); background: rgba(245,158,11,0.1); }
        .status-bar.ready { color: var(--success); background: rgba(34,197,94,0.1); }
        .status-bar.error { color: var(--error); background: rgba(239,68,68,0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
        audio { width: 100%; margin-top: 1rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="badge">🔒 100% Offline</div>
            <h1>Voz Mejorada Sintetizada</h1>
            <p style="color: var(--muted); font-size: 0.8rem;">Motor Piper TTS + ONNX Runtime</p>
        </div>

        <div class="field">
            <label>Voz</label>
            <select id="voiceSelect">
                <option value="daniela">🇦🇷 Daniela (Argentina)</option>
                <option value="claude">🇲🇽 Claude (México)</option>
            </select>
        </div>

        <div class="field">
            <label>Texto</label>
            <textarea id="textInput">Hola Héctor, ¿cómo estás? Esta es una prueba de voz profesional funcionando totalmente fuera de línea.</textarea>
        </div>

        <div class="sliders">
            <div class="field"><label>Velocidad</label><input type="range" id="lengthScale" min="0.5" max="2" step="0.1" value="1"></div>
            <div class="field"><label>Variación</label><input type="range" id="noiseScale" min="0.1" max="1.5" step="0.1" value="0.67"></div>
        </div>

        <button id="btnSpeak" disabled>⏳ Cargando motor...</button>
        <audio id="player" controls></audio>
        <button id="btnDownload">⬇ Descargar WAV</button>

        <div id="statusBar" class="status-bar loading"><div class="dot"></div><span id="statusMsg">Inicializando motor...</span></div>
    </div>

    <script src="piper_phonemize.js"></script>
    <script src="ort.min.js"></script>
    <script>
        (async function() {
            const VOICES = {
                daniela: { model: './daniela/es_AR-daniela-high.onnx', lang: 'es-419', rate: 22050 },
                claude: { model: './claude/es_MX-claude-high.onnx', lang: 'es-419', rate: 22050 }
            };

            const btn = document.getElementById('btnSpeak');
            const btnDl = document.getElementById('btnDownload');
            const player = document.getElementById('player');
            const statusMsg = document.getElementById('statusMsg');
            const statusBar = document.getElementById('statusBar');

            let piperModule = null;
            let piperOutput = "";
            let piperInput = "";
            let piperInputIdx = 0;
            const sessions = {};

            function setStatus(msg, cls) {
                statusBar.className = 'status-bar ' + cls;
                statusMsg.textContent = msg;
            }

            // --- Inicialización de Piper ---
            async function initPiper() {
                return new Promise((resolve, reject) => {
                    const modConfig = {
                        locateFile: (n) => './' + n,
                        print: (d) => { piperOutput += d + "\n"; },
                        printErr: (d) => { console.warn("[Piper]", d); },
                        stdin: () => {
                            if (piperInputIdx < piperInput.length) return piperInput.charCodeAt(piperInputIdx++);
                            return null;
                        },
                        onRuntimeInitialized: () => resolve()
                    };
                    createPiperPhonemize(modConfig).then(m => { piperModule = m; resolve(m); });
                });
            }

            async function getSession(key) {
                if (sessions[key]) return sessions[key];
                setStatus('Cargando modelo de voz (puede tardar)...', 'loading');
                const sess = await ort.InferenceSession.create(VOICES[key].model, { executionProviders: ['wasm'] });
                sessions[key] = sess;
                return sess;
            }

            async function phonemize(text, lang) {
                piperOutput = "";
                piperInput = text + "\n";
                piperInputIdx = 0;
                
                try {
                    // Usamos una llamada controlada para evitar desbordamientos
                    console.log("[Piper] Ejecutando callMain con:", ['-l', lang, '--espeak-data', '/espeak-ng-data', '--output_type', 'json', text]);
                    piperModule.callMain(['-l', lang, '--espeak-data', '/espeak-ng-data', '--output_type', 'json', text]);
                } catch(e) { console.error("Error en callMain", e); }

                console.log("[Piper Result Raw]:", piperOutput);
                const lines = piperOutput.split("\n");
                for (const line of lines) {
                    if (line.trim().startsWith('{')) {
                        try {
                            const p = JSON.parse(line);
                            if (p.phoneme_ids) return p.phoneme_ids;
                        } catch(e) {}
                    }
                }
                throw new Error("No se pudo obtener la fonematización");
            }

            function encodeWav(samples, sampleRate) {
                const buffer = new ArrayBuffer(44 + samples.length * 2);
                const view = new DataView(buffer);
                const writeString = (off, s) => { for (let i=0; i<s.length; i++) view.setUint8(off+i, s.charCodeAt(i)); };
                
                writeString(0, 'RIFF'); view.setUint32(4, 36 + samples.length * 2, true);
                writeString(8, 'WAVE'); writeString(12, 'fmt '); view.setUint32(16, 16, true);
                view.setUint16(20, 1, true); view.setUint16(22, 1, true);
                view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
                view.setUint16(32, 2, true); view.setUint16(34, 16, true);
                writeString(36, 'data'); view.setUint32(40, samples.length * 2, true);

                for (let i = 0, offset = 44; i < samples.length; i++, offset += 2) {
                    let s = Math.max(-1, Math.min(1, samples[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                }
                return buffer;
            }

            // --- Lógica Principal ---
            btn.onclick = async () => {
                const text = document.getElementById('textInput').value.trim();
                if (!text) return;
                const voiceKey = document.getElementById('voiceSelect').value;
                const nS = parseFloat(document.getElementById('noiseScale').value);
                const lS = parseFloat(document.getElementById('lengthScale').value);

                btn.disabled = true;
                setStatus('Procesando...', 'loading');

                try {
                    const phonemes = await phonemize(text, VOICES[voiceKey].lang);
                    const session = await getSession(voiceKey);
                    
                    const feeds = {
                        input: new ort.Tensor('int64', BigInt64Array.from(phonemes.map(BigInt)), [1, phonemes.length]),
                        input_lengths: new ort.Tensor('int64', BigInt64Array.from([BigInt(phonemes.length)]), [1]),
                        scales: new ort.Tensor('float32', Float32Array.from([nS, lS, 0.8]), [3]),
                        sid: new ort.Tensor('int64', BigInt64Array.from([0n]), [1])
                    };

                    const result = await session.run(feeds);
                    const audioData = result.output ? result.output.data : result[Object.keys(result)[0]].data;
                    const wav = encodeWav(audioData, VOICES[voiceKey].rate);
                    
                    const url = URL.createObjectURL(new Blob([wav], { type: 'audio/wav' }));
                    player.src = url;
                    player.style.display = 'block';
                    player.play();
                    
                    btnDl.style.display = 'block';
                    btnDl.onclick = () => { const a = document.createElement('a'); a.href = url; a.download = 'audio.wav'; a.click(); };
                    setStatus('✓ Audio generado', 'ready');
                } catch(e) {
                    setStatus('Error: ' + e.message, 'error');
                    console.error(e);
                } finally { btn.disabled = false; }
            };

            // Iniciar
            try {
                window.ort.env.wasm.wasmPaths = './';
                await initPiper();
                setStatus('Motor listo ✓', 'ready');
                btn.disabled = false;
                btn.textContent = '🎙 Sintetizar y Escuchar';
            } catch(e) { setStatus('Error de carga', 'error'); console.error(e); }
        })();
    </script>
</body>
</html>
